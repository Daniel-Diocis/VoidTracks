name: void_tracks
description: A simple Flutter application
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.7.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  just_audio: ^0.9.34
  just_audio_background: ^0.0.1-beta.15
  audio_session: ^0.1.15
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0 # solo per Android/iOS
  http: ^0.13.6
  path_provider: ^2.1.1
  supabase_flutter: ^2.8.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1
  build_runner: ^2.4.6
  isar_generator: ^3.1.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/icon.png
    - assets/images/
    - assets/audio/